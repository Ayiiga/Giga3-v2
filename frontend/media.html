<!DOCTYPE html>
<html>
<head>
  <title>Media Studio - Giga3 AI</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="app-shell" style="max-width:900px;margin:0 auto;padding:24px;">
    <div class="logo" style="margin-bottom:8px;">Giga3 AI — Media Studio</div>
    <p style="color:#9aa0b4;margin-top:0;">
      Image-to-video via <strong>nvidia/cosmos-3-super/image-to-video</strong> (fal.ai). Costs 5 tokens per video, 2 per image.
    </p>
    <div class="tokens" style="margin-bottom:16px;">
      <span id="userEmail">guest</span> • Tokens: <span id="tokenCount">-</span>
      • <a href="dashboard.html" style="color:#7c5cff;">Chat</a>
    </div>

    <section class="glass" style="padding:20px;margin-bottom:20px;border-radius:12px;">
      <h2 style="margin-top:0;font-size:1.1rem;">Image → Video</h2>
      <label style="display:block;margin-bottom:8px;color:#9aa0b4;font-size:0.85rem;">First-frame image URL</label>
      <input id="imageUrl" type="url" placeholder="https://..." style="width:100%;margin-bottom:12px;" />
      <label style="display:block;margin-bottom:8px;color:#9aa0b4;font-size:0.85rem;">Motion prompt</label>
      <textarea id="videoPrompt" rows="3" placeholder="The camera slowly pushes in..." style="width:100%;margin-bottom:12px;"></textarea>
      <details style="margin-bottom:12px;color:#9aa0b4;">
        <summary>Advanced (fal parameters)</summary>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
          <input id="videoWidth" type="number" placeholder="Width (832)" />
          <input id="videoHeight" type="number" placeholder="Height (480)" />
          <input id="numFrames" type="number" placeholder="num_frames (189)" />
          <input id="fps" type="number" placeholder="frames_per_second (24)" />
          <input id="steps" type="number" placeholder="num_inference_steps (28)" />
          <input id="guidance" type="number" step="0.1" placeholder="guidance_scale (6)" />
        </div>
      </details>
      <button id="videoBtn" onclick="generateVideo()">Generate video (5 tokens)</button>
      <div id="videoResult" style="margin-top:16px;"></div>
    </section>

    <section class="glass" style="padding:20px;border-radius:12px;">
      <h2 style="margin-top:0;font-size:1.1rem;">Text → Image</h2>
      <textarea id="imagePrompt" rows="2" placeholder="A serene landscape at dusk..." style="width:100%;margin-bottom:12px;"></textarea>
      <button id="imageBtn" onclick="generateImage()">Generate image (2 tokens)</button>
      <div id="imageResult" style="margin-top:16px;"></div>
    </section>
  </div>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/media.js"></script>
</body>
</html>
