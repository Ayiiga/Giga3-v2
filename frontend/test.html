<!DOCTYPE html>
<html>
<head>
  <title>Giga3 AI Test</title>
  <link rel="icon" href="./assets/icons/icon-192.png" type="image/png" />
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

<a href="index.html" class="brand" style="margin:20px;">
  <img class="brand-logo" src="./assets/images/logo.png" alt="" width="40" height="40" />
  <span class="brand-name">Giga3 AI</span>
</a>
<h2>Giga3 AI Test</h2>

<input id="msg" placeholder="Ask AI..." />
<button onclick="send()">Send</button>

<p id="out"></p>

<script>
async function send() {
  const message = document.getElementById("msg").value;

  const res = await fetch("https://colorful-porpoise-374.convex.cloud/action/ai:askAI", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  document.getElementById("out").innerText = data;
}
</script>

</body>
</html>
