<!DOCTYPE html>
<html>
<head>

  <meta name="theme-color" content="#071018" />
  <link rel="icon" href="./assets/icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="./site.webmanifest" />
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

  <div class="auth-box">
    <a href="index.html" class="brand brand-center" style="margin-bottom:20px;">

    <h2>Login</h2>

    <input id="email" placeholder="Email" />

    <button onclick="login()">Login</button>
    <p style="margin-top:14px;color:rgba(255,255,255,0.75);font-size:14px;">New here? <a href="signup.html" style="color:#7c5cff;">Create an account</a></p>
  </div>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/auth.js"></script>
