name: Deploy Convex backend

on:
  push:
    branches: [main]
    paths:
      - "convex/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

concurrency:
  group: convex-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Secrets: set CONVEX_DEPLOY_KEY on repo OR on environment CF_ACCOUNT_ID
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check Convex sources
        run: |
          if rg '^\+' convex --glob '*.ts' -q; then
            echo "::error::Invalid '+' diff markers in convex/*.ts — fix before deploy"
            rg '^\+' convex --glob '*.ts'
            exit 1
          fi

      - name: Validate deploy key
        # Uses secrets from environment CF_ACCOUNT_ID and/or repository
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT_VALUE: ${{ secrets.CONVEX_DEPLOYMENT_VALUE }}
        run: |
          set -euo pipefail
          RAW="${CONVEX_DEPLOY_KEY:-${CONVEX_DEPLOYMENT_VALUE:-}}"
          DEPLOY_KEY="$(printf '%s' "$RAW" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "${DEPLOY_KEY}" ]; then
            echo "::error::Add GitHub secret CONVEX_DEPLOY_KEY (Convex dashboard → production deployment → Settings → Deploy key). Format: prod:deployment-name|token"
            exit 1
          fi
          if [[ "${DEPLOY_KEY}" == user-* ]]; then
            echo "::error::CONVEX_DEPLOY_KEY looks like a user id. Use prod:your-deployment|eyJ…"
            exit 1
          fi
          if [[ "${DEPLOY_KEY}" != *"|"* ]]; then
            echo "::error::CONVEX_DEPLOY_KEY must include a pipe (|). Example: prod:perfect-lark-521|eyJ…"
            exit 1
          fi
          PREFIX="${DEPLOY_KEY%%|*}"
          echo "Deploy key prefix: ${PREFIX}|… (length ${#DEPLOY_KEY})"
          if [[ "${PREFIX}" == preview:* ]]; then
            echo "::error::Use a production deploy key (prod:…), not preview:…"
            exit 1
          fi
          if [[ "${PREFIX}" != prod:* ]]; then
            echo "::error::Use a production deploy key (prod:deployment-name|token). Got: ${PREFIX}"
            exit 1
          fi
          echo "DEPLOY_KEY=${DEPLOY_KEY}" >> "$GITHUB_ENV"

      - name: Deploy to Convex
        id: convex_deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ env.DEPLOY_KEY }}
        run: |
          set -o pipefail
          echo "convex CLI: $(npx convex --version)"
          if ! npx convex deploy --yes --verbose --typecheck disable 2>&1 | tee convex-deploy.log; then
            echo "## Convex deploy failed" >> "$GITHUB_STEP_SUMMARY"
            echo "If you see Unauthorized or Invalid deploy key, regenerate **prod:perfect-lark-521|…** in Convex dashboard and update GitHub secret CONVEX_DEPLOY_KEY." >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -80 convex-deploy.log >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Apply chat latency env defaults
        if: success()
        env:
          CONVEX_DEPLOY_KEY: ${{ env.DEPLOY_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          PAYSTACK_PUBLIC_KEY: ${{ secrets.PAYSTACK_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          npx convex env set CHAT_PROVIDER_TIMEOUT_MS "45000"
          npx convex env set CHAT_WORKER_TIMEOUT_MS "240000"
          npx convex env set CHAT_WORKER_IMAGE_TIMEOUT_MS "300000"
          npx convex env set CHAT_MAX_TOKENS "1024"
          npx convex env set CHAT_MAX_HISTORY_TURNS "12"
          npx convex env set CHAT_ENABLE_FAL "false"
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            npx convex env set GEMINI_API_KEY "${GEMINI_API_KEY}"
          fi
          if [ -n "${FAL_KEY:-}" ]; then
            npx convex env set FAL_KEY "${FAL_KEY}"
            npx convex env set FAL_VIDEO_MODEL "nvidia/cosmos-3-super/image-to-video"
            npx convex env set FAL_IMAGE_MODEL "fal-ai/nano-banana-pro"
          fi
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            npx convex env set OPENAI_API_KEY "${OPENAI_API_KEY}"
          fi
          if [ -n "${PAYSTACK_SECRET_KEY:-}" ]; then
            npx convex env set PAYSTACK_SECRET_KEY "${PAYSTACK_SECRET_KEY}"
          fi
          if [ -n "${PAYSTACK_PUBLIC_KEY:-}" ]; then
            npx convex env set PAYSTACK_PUBLIC_KEY "${PAYSTACK_PUBLIC_KEY}"
          fi
          echo "Chat latency env applied (CHAT_*). Optional secrets synced if present."

      - name: Convex deploy failure details
        if: failure() && steps.convex_deploy.outcome == 'failure'
        run: |
          echo "## Convex deploy failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -60 convex-deploy.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "::error::See job summary for convex-deploy.log tail"
          exit 1

      - name: Upload deploy log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: convex-deploy-log
          path: convex-deploy.log
          if-no-files-found: ignore

      - name: Deployment summary
        if: success()
        run: |
          echo "### Convex deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Backend deployed. CHAT_* latency defaults applied." >> "$GITHUB_STEP_SUMMARY"
          echo "Add GitHub secrets OPENAI_API_KEY, GEMINI_API_KEY, FAL_KEY (optional) to sync provider keys on each deploy." >> "$GITHUB_STEP_SUMMARY"
          SHORT_SHA="${GITHUB_SHA::7}"
          SUBJECT="$(git log -1 --pretty=%s)"
          echo "GIGA3_DEPLOY_READY ${SHORT_SHA}|${SUBJECT}"
          echo "${SHORT_SHA}|${SUBJECT}"
