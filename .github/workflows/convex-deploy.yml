name: Deploy Convex backend

on:
  push:
    branches: [main]
    paths:
      - "convex/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

concurrency:
  group: convex-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate deploy key
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT_VALUE: ${{ secrets.CONVEX_DEPLOYMENT_VALUE }}
        run: |
          set -euo pipefail
          RAW="${CONVEX_DEPLOY_KEY:-${CONVEX_DEPLOYMENT_VALUE:-}}"
          DEPLOY_KEY="$(printf '%s' "$RAW" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "${DEPLOY_KEY}" ]; then
            echo "::error::Add GitHub secret CONVEX_DEPLOY_KEY (Convex dashboard → production deployment → Settings → Deploy key → Generate). Format: prod:deployment-name|token"
            exit 1
          fi
          if [[ "${DEPLOY_KEY}" == user-* ]]; then
            echo "::error::CONVEX_DEPLOY_KEY looks like a user id (user-…). Generate a production deploy key: prod:your-deployment|eyJ…"
            exit 1
          fi
          if [[ "${DEPLOY_KEY}" != *"|"* ]]; then
            echo "::error::CONVEX_DEPLOY_KEY must include a pipe (|). Example: prod:perfect-lark-521|eyJ…"
            exit 1
          fi
          PREFIX="${DEPLOY_KEY%%|*}"
          echo "Deploy key prefix: ${PREFIX}|… (length ${#DEPLOY_KEY})"
          if [[ "${PREFIX}" == preview:* ]]; then
            echo "::error::Preview deploy key detected. For main branch CI use a production key (prod:deployment-name|…), not preview:team:project|…"
            exit 1
          fi
          if [[ "${PREFIX}" != prod:* ]]; then
            echo "::warning::Deploy key does not start with prod: — deploying with prefix '${PREFIX}'. Use a production deploy key if this workflow should update prod."
          fi
          echo "DEPLOY_KEY=${DEPLOY_KEY}" >> "$GITHUB_ENV"

      - name: Deploy to Convex
        id: convex_deploy
        run: |
          set -euo pipefail
          export CONVEX_DEPLOY_KEY="${DEPLOY_KEY}"
          npx convex deploy --yes --verbose --typecheck try 2>&1 | tee convex-deploy.log

      - name: Convex deploy failure details
        if: failure() && steps.convex_deploy.outcome == 'failure'
        run: |
          echo "## Convex deploy failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -60 convex-deploy.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "::error::See job summary for convex-deploy.log tail"
          exit 1

      - name: Upload deploy log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: convex-deploy-log
          path: convex-deploy.log
          if-no-files-found: ignore

      - name: Deployment summary
        if: success()
        run: |
          echo "### Convex deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Backend deployed (chatEngine failover, Paystack, credits)." >> "$GITHUB_STEP_SUMMARY"
