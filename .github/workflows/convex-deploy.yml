name: Deploy Convex backend

on:
  push:
    branches: [main]
    paths:
      - "convex/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

concurrency:
  group: convex-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT_VALUE: ${{ secrets.CONVEX_DEPLOYMENT_VALUE }}
        run: |
          set -euo pipefail
          DEPLOY_KEY="${CONVEX_DEPLOY_KEY:-${CONVEX_DEPLOYMENT_VALUE:-}}"
          if [ -z "${DEPLOY_KEY}" ]; then
            echo "::error::Add GitHub secret CONVEX_DEPLOY_KEY (Convex dashboard → Settings → Deploy key → Generate)"
            exit 1
          fi
          export CONVEX_DEPLOY_KEY="${DEPLOY_KEY}"
          npx convex deploy --yes

      - name: Deployment summary
        if: success()
        run: |
          echo "### Convex deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Backend deployed (chatEngine failover, Paystack, credits)." >> "$GITHUB_STEP_SUMMARY"
