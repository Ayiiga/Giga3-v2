name: Apply GigaSocial Supabase storage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/20260708120000_gigasocial_storage.sql"
      - "scripts/apply-gigasocial-storage.mjs"
      - ".github/workflows/supabase-gigasocial-storage.yml"

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Apply storage buckets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::warning::Skipping bucket creation — set NEXT_PUBLIC_SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY in GitHub secrets/vars."
            exit 0
          fi
          npm run supabase:gigasocial-storage

      - name: Apply RLS policies (optional)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::notice::SUPABASE_ACCESS_TOKEN not set — apply supabase/migrations/20260708120000_gigasocial_storage.sql manually in SQL Editor."
            exit 0
          fi
          REF="$(python3 -c "from urllib.parse import urlparse; import os; print(urlparse(os.environ['NEXT_PUBLIC_SUPABASE_URL']).hostname.split('.')[0])")"
          SQL="$(cat supabase/migrations/20260708120000_gigasocial_storage.sql)"
          curl -fsS -X POST "https://api.supabase.com/v1/projects/${REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c 'import json,os,sys; print(json.dumps({"query": sys.stdin.read()}))' <<<"$SQL")"
          echo "RLS policies applied via Supabase Management API."
