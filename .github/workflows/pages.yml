name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        working-directory: .
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        run: |
          set -euo pipefail
          missing=0
          for name in CF_API_TOKEN CF_ACCOUNT_ID NEXT_PUBLIC_CONVEX_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Required secrets present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            echo "::warning::package-lock.json missing; using npm install --legacy-peer-deps"
            npm install --legacy-peer-deps
          fi

      - name: Lint
        run: npm run lint

      - name: Build static site
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CONVEX_SITE_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_SITE_URL }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          set -eo pipefail
          npm run build 2>&1 | tee ../build.log || {
            echo "::group::Next.js build log"
            cat ../build.log
            echo "::endgroup::"
            echo "### Next.js build failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -120 ../build.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Report build failure
        if: failure()
        working-directory: .
        run: |
          echo "### Next.js build log (last 100 lines)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -100 build.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-build-log
          path: build.log

      - name: Verify Convex URL in static bundle
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        run: node scripts/verify-convex-in-build.mjs

      - name: Verify static output
        run: |
          find out -maxdepth 4 -name 'index.html' | head -30
          if [ -f out/index.html ]; then
            echo "Found out/index.html"
          elif [ -f out/index/index.html ]; then
            echo "Found out/index/index.html (trailingSlash)"
          else
            echo "::error::No index.html in out/ — static export may have failed"
            ls -la out 2>/dev/null || ls -la
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: giga3ai
          directory: web/out
