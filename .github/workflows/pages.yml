name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Convex URL (health-checked)
        working-directory: .
        env:
          SECRET_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          SECRET_CONVEX_SITE_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_SITE_URL }}
        run: |
          set -euo pipefail
          # Production Convex deployment (see AGENTS.md). Used when the
          # NEXT_PUBLIC_CONVEX_URL secret is missing or points at a dead
          # deployment — a stale secret once shipped a bundle wired to a
          # deleted instance, breaking every backend feature on the live site.
          FALLBACK_URL="https://perfect-lark-521.convex.cloud"
          FALLBACK_SITE_URL="https://perfect-lark-521.convex.site"
          RESOLVED="${SECRET_CONVEX_URL:-}"
          RESOLVED_SITE="${SECRET_CONVEX_SITE_URL:-}"
          healthy() {
            curl -fsS -o /dev/null --max-time 15 "$1"
          }
          if [ -z "$RESOLVED" ]; then
            echo "::warning::NEXT_PUBLIC_CONVEX_URL secret is not set — using ${FALLBACK_URL}"
            RESOLVED="$FALLBACK_URL"
            RESOLVED_SITE="$FALLBACK_SITE_URL"
          elif ! healthy "$RESOLVED"; then
            echo "::warning::NEXT_PUBLIC_CONVEX_URL (${RESOLVED}) is not responding — it likely points at a deleted Convex deployment. Falling back to ${FALLBACK_URL}. Update the GitHub secret NEXT_PUBLIC_CONVEX_URL."
            RESOLVED="$FALLBACK_URL"
            RESOLVED_SITE="$FALLBACK_SITE_URL"
          fi
          if ! healthy "$RESOLVED"; then
            echo "::error::Convex deployment ${RESOLVED} is unreachable — aborting deploy."
            exit 1
          fi
          echo "Resolved Convex URL: ${RESOLVED}"
          echo "RESOLVED_CONVEX_URL=${RESOLVED}" >> "$GITHUB_ENV"
          echo "RESOLVED_CONVEX_SITE_URL=${RESOLVED_SITE}" >> "$GITHUB_ENV"

      - name: Validate deployment secrets
        working-directory: .
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NEXT_PUBLIC_CONVEX_URL: ${{ env.RESOLVED_CONVEX_URL }}
          NEXT_PUBLIC_GIGA3_DATA_BACKEND: ${{ vars.NEXT_PUBLIC_GIGA3_DATA_BACKEND || secrets.NEXT_PUBLIC_GIGA3_DATA_BACKEND || 'convex' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in CF_API_TOKEN CF_ACCOUNT_ID NEXT_PUBLIC_CONVEX_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "${NEXT_PUBLIC_GIGA3_DATA_BACKEND}" = "supabase" ]; then
            for name in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY; do
              if [ -z "${!name}" ]; then
                echo "::error::Missing GitHub secret or variable: $name"
                missing=1
              fi
            done
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Required secrets present."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            echo "::warning::package-lock.json missing; using npm install --legacy-peer-deps"
            npm install --legacy-peer-deps
          fi

      - name: Lint
        run: npm run lint

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Chat overflow viewport audit
        run: npm run test:chat-overflow

      - name: Build static site
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ env.RESOLVED_CONVEX_URL }}
          NEXT_PUBLIC_CONVEX_SITE_URL: ${{ env.RESOLVED_CONVEX_SITE_URL }}
          NEXT_PUBLIC_GIGA3_DATA_BACKEND: ${{ vars.NEXT_PUBLIC_GIGA3_DATA_BACKEND || secrets.NEXT_PUBLIC_GIGA3_DATA_BACKEND || 'convex' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          set -eo pipefail
          npm run build 2>&1 | tee ../build.log || {
            echo "::group::Next.js build log"
            cat ../build.log
            echo "::endgroup::"
            echo "### Next.js build failed" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -120 ../build.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Report build failure
        if: failure()
        working-directory: .
        run: |
          echo "### Next.js build log (last 100 lines)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -100 build.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-build-log
          path: build.log

      - name: Verify Convex URL in static bundle
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ env.RESOLVED_CONVEX_URL }}
        run: node scripts/verify-convex-in-build.mjs

      - name: Verify Supabase configuration
        working-directory: .
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" ]; then
            echo "::notice::Skipping Supabase verification because NEXT_PUBLIC_SUPABASE_URL or NEXT_PUBLIC_SUPABASE_ANON_KEY is not set for GitHub Actions."
            exit 0
          fi
          npm run supabase:verify

      - name: Verify static output
        run: |
          find out -maxdepth 4 -name 'index.html' | head -30
          if [ -f out/index.html ]; then
            echo "Found out/index.html"
          elif [ -f out/index/index.html ]; then
            echo "Found out/index/index.html (trailingSlash)"
          else
            echo "::error::No index.html in out/ — static export may have failed"
            ls -la out 2>/dev/null || ls -la
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Cloudflare deploy attempt ${attempt}/${max_attempts}"
            if npx wrangler@4 pages deploy web/out --project-name=giga3ai --branch="$DEPLOY_BRANCH"; then
              SHORT_SHA="${GITHUB_SHA::7}"
              SUBJECT="$(git log -1 --pretty=%s)"
              echo "GIGA3_DEPLOY_READY ${SHORT_SHA}|${SUBJECT}"
              echo "${SHORT_SHA}|${SUBJECT}"
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_seconds=$((attempt * 20))
              echo "Deploy failed; retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
            attempt=$((attempt + 1))
          done
          echo "::error::Cloudflare Pages deployment failed after ${max_attempts} attempts."
          exit 1
